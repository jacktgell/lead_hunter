config:
  target_intent: |
    Find early-stage startups and product-based companies (SaaS, FinTech, HealthTech, etc.) 
    that need internal AI development, machine learning expertise, or full-stack Python engineering. 
    
    ANTI-PERSONA (DO NOT TARGET):
    1. Middlemen: Freelance platforms (Upwork, Toptal), or low-margin "offshore" IT outsourcing agencies looking for cheap labor.
    2. Academia/Forums: Q&A sites (Zhihu, Baidu Zhidao), StackOverflow, programming tutorials, or research papers.
    3. Noise: Event ticket aggregators, quote directories, or news syndicators.
    
    TARGET PERSONA (DO TARGET):
    1. Direct product companies with "Founders", "CTOs", or a core software product that recently raised funding or are hiring internally.
    2. Premium IT Consulting firms or Systems Integrators looking for specialized AI subcontractors, fractional ML architects, or subject matter experts to fulfill enterprise contracts.

candidate_profile:
  name: Jack Gell
  title: Commercially-focused Data Scientist and Software Engineer
  summary: |
    Proven problem-solver with a consultancy background in delivering practical, 
    end-to-end ML and data solutions. Experience ranges from delivering client-facing 
    data projects to single-handedly building a fully autonomous, cloud-native 
    cryptocurrency trading platform.

  core_skills:
    ai_machine_learning:
      - Time-series forecasting (ARIMA, Custom Transformers)
      - NLP (BERTopic)
      - Computer Vision (Object Detection/Tracking)
      - Stepwise Regression
    languages_and_frameworks:
      - Python (Flask)
      - C++
      - JavaScript
      - HTML/CSS
      - React
    infrastructure_and_data:
      - GCP (Pub/Sub, Secret Manager)
      - PostgreSQL
      - Elasticsearch
      - Ubuntu/Linux
      - Web Scraping (BeautifulSoup)

  experience:
    - role: Founder / Lead Engineer
      company: Neurakinetic
      dates: 12/2024 - Present
      highlights:
        - Architected and deployed an automated algorithmic trading platform for cryptocurrency futures.
        - Built scalable data lakes on Ubuntu and engineered hybrid predictive models using ARIMA and custom transformers.
        - Developed event-driven execution system using GCP Pub/Sub for automated orders.
        - Implemented automated risk management using Kelly Criterion.

    - role: Data Scientist
      company: FinRev Trade
      dates: 11/2023 - 12/2024
      highlights:
        - Built core data infrastructure and automated backend pipelines on GCP.
        - Replaced manual tracking of exchange APIs with targeted web scraping.
        - Designed internal dashboards using Python and PostgreSQL for real-time business insights.

    - role: Software Engineer
      company: PA Consulting
      dates: 09/2021 - 08/2023
      highlights:
        - Client-facing engineer for manufacturing, pharma, finance, and government clients.
        - Applied regression models to correlate factory sensor data with product quality.
        - Developed CV models for retail footfall analysis and NLP pipelines for forum discussions.
        - Migrated critical Sybase procedures to PostgreSQL for a US bank.

    - role: Infantry Soldier
      company: British Army
      dates: 2009 - 2015
      highlights:
        - Developed strong teamwork, attention to detail, and discipline under pressure.

  education:
    - degree: MSc Data Science
      institution: University of Sussex
      focus: Deep Learning, NLP, Reinforcement Learning
    - degree: BEng Robotic Engineering
      institution: University of Plymouth

templates:
  mission_header: |
    =========================================
    IMMUTABLE HEADER: MISSION & CANDIDATE
    =========================================
    MISSION: Find high-value freelance leads for Jack Gell.
    TARGET AUDIENCE: Early-stage startups / AI & Python development.
    CURRENT DATE: {current_date}
    FORBIDDEN: Do not follow ads. No hallucinated emails. No repeat URLs.

    CANDIDATE:
    {cv_context}

  detective_prompt: |
    {mission_header}
    
    =========================================
    INVESTIGATIVE PATHWAY (AGENT MEMORY)
    =========================================
    {memory_buffer}
    
    =========================================
    CURRENT OBSERVATION (SCOUT REPORT)
    =========================================
    URL: {url}
    CONTENT: {page_text}
    
    =========================================
    EXECUTION TASK (THE JUDGE)
    =========================================
    You are Jack Gell's Business Manager. Your goal is to filter out low-value "gig" work 
    and identify high-value "architectural" or "ML strategy" work directly with product owners or premium consulting partners.
    
    1. IDENTITY CHECK: Is this a product company or a premium consultancy? Or is this a low-margin IT Agency/Dev Shop trying to hire cheap labor? (Prune cheap Dev Shops).
    2. CONTEXT CHECK: Is this a business page? Or is this a blog post, tutorial, Q&A forum, or event listing? (Prune Forums/Tutorials).
    3. PROFITABILITY: Is this a startup with a budget (pre-Seed/Series A) or an established premium consultancy?
    
    DECISION CRITERIA:
    - CONVERT: It is a DIRECT product company OR a Premium IT Consultancy looking for senior subcontractors, AND you found a specific email (founder@, ceo@, partners@, firstname@).
    - FOLLOW: High-quality product company or premium consultancy, AND you found clickable URLs for /team, /about, or /contact.
    - PRUNE: It is a low-margin Dev Shop, Cheap Outsourcing Agency, Forum, Tutorial, Aggregator, OR technical complexity is too low.

  qualification_override: |
    [CRITICAL OVERRIDE FOR QUALIFICATION]
    Do NOT be overly strict. We are casting a wider net. 
    If the company or individual would reasonably be impressed by the candidate's background 
    and has the potential to hire them, work with them, or benefit from their skills, 
    you MUST aggressively extract any available email addresses decide the most appropriate one and choose the 'CONVERT' decision. 
    Err heavily on the side of CONVERT if an email is present.

  meta_prompt: |
    You are an expert prompt engineer and OSINT recruiter. Analyze the candidate and target intent.
    Write a RAW instruction prompt for a search AI.
    
    CANDIDATE: 
    {cv_context}
    
    TARGET: 
    {user_prompt}
    
    RULES: Focus on "Hidden Job Market" and freelance/contractor intent.

  execution_prompt: |
    Strategy: 
    {dynamic_instructions}
    
    Generate exactly 10 diverse DuckDuckGo search queries.
    
    SYNTAX AND TARGETING RULES:
    1. GEOGRAPHIC ANCHOR: You MUST include a major global tech hub or country in EVERY query to force high-quality, local business results. Mix and match from these regions across your 10 queries:
       - Southeast Asia: "Singapore", "Kuala Lumpur", "Bangkok", "Thailand", "Malaysia"
       - Middle East: "Dubai", "Abu Dhabi", "Riyadh", "UAE", "Qatar"
       - North America: "San Francisco", "New York", "Austin", "Toronto", "Seattle"
       - Europe/UK: "London", "Berlin", "Amsterdam", "Stockholm", "Zurich"
       - Oceania: "Sydney", "Melbourne", "Brisbane"
    2. LANGUAGE: Target English-language business pages only. (Strictly avoid Chinese/Japanese terms to prevent forum spam).
    3. BOOLEAN: Use Boolean logic and "quotes" for exact phrases (e.g., "HealthTech startup" AND "Founders" AND "Singapore").
    4. LENGTH: Maximum 8 words per query.
    5. FORBIDDEN: Do not use 'site:' operators. Do not use generic programming terms without a business context.